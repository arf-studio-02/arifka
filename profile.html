<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Arifka</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="base.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        .profile-card {
    width: 100%;
    max-width: 360px;

    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(18px);

    border-radius: 20px;
    padding: 30px 20px;

    text-align: center;

    border: 1px solid rgba(255,255,255,0.4);

    box-shadow: 0 10px 30px rgba(0,0,0,0.08);

    /* 🔥 ANIMASI */
    opacity: 0;
    transform: translateY(30px) scale(0.95);
    animation: 
    cardFadeIn 0.6s ease forwards;
    position: relative; 
    overflow: hidden; 
}
@keyframes cardFadeIn {
    0% {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
    }
    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}
.profile-card::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;

    width: 50%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.5),
        transparent
    );

    transform: skewX(-25deg);

    animation: shine 4s infinite;
}
@keyframes shine {
    0% {
        left: -120%;
    }
    50% {
        left: 120%;
    }
    100% {
        left: 120%;
    }
}
.profile-card:hover {
    transform: translateY(-5px) scale(1.01);
    box-shadow: 0 20px 40px rgba(0,0,0,0.12);
}
        /* FOTO */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;

            border: 3px solid rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        /* NAMA */
        .name {
            font-size: 20px;
            font-weight: 600;
            color: #111;
            margin-bottom: 8px;
        }

        /* DESKRIPSI */
        .desc {
            font-size: 14px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        /* BUTTON BACK */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;

            padding: 10px 14px;
            border-radius: 12px;

            background: #111;
            color: #fff;

            text-decoration: none;
            font-size: 13px;

            transition: 0.25s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            background: #000;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="profile-card">

        <!-- FOTO -->
        <img src="assets/foto.png" class="profile-img">

        <!-- NAMA -->
        <div class="name">ARIFKA PURWANTOMO</div>

        <!-- DESKRIPSI -->
        <div class="desc">
            Bachelor of Electrical Engineering • University of Trunodjoyo Madura<br>
            Power System Enthusiast ⚡<br>
            Keep learning. Keep growing.
        </div>

        <!-- BUTTON BACK -->
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

    </div>

</div>

</body>
</html>
